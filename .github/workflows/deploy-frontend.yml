name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify API URL secret
        run: |
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "::error::Set the VITE_API_BASE_URL repository secret to your deployed backend URL (see DEPLOY.md)."
            exit 1
          fi

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Set this in: Repo Settings → Secrets and variables → Actions → New secret
          # Name: VITE_API_BASE_URL   Value: your deployed backend URL
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
